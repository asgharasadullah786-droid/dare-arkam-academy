<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dare Arkam Academy - Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#f4f6f9;}

.sidebar{
height:100vh;
background:#0d6efd;
color:white;
padding:20px;
position:fixed;
width:230px;
}

.sidebar h4{color:white;}

.main{
margin-left:250px;
padding:25px;
}

.card{
border:none;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.dark-mode{
background:#121212 !important;
color:white !important;
}

.dark-mode .card{
background:#1e1e1e;
color:white;
}
</style>
</head>
<body>

<!-- LOGIN MODAL -->
<div class="modal fade show" id="loginModal" style="display:block;" data-bs-backdrop="static">
<div class="modal-dialog">
<div class="modal-content">
<div class="modal-body text-center">
<h4>Dare Arkam Admin Login</h4>
<input type="password" id="password" class="form-control my-3" placeholder="Enter Password">
<button class="btn btn-primary w-100" onclick="login()">Login</button>
</div>
</div>
</div>
</div>

<div id="dashboard" style="display:none;">

<!-- SIDEBAR -->
<div class="sidebar">
<h4>Dare Arkam</h4>
<hr>
<button class="btn btn-light w-100 mb-2" onclick="toggleDark()">Dark Mode</button>
<a href="index.html" class="btn btn-warning w-100">Back to Website</a>
</div>

<!-- MAIN CONTENT -->
<div class="main">

<h2 class="mb-4">Admin Dashboard</h2>

<!-- SUMMARY CARDS -->
<div class="row mb-4">
<div class="col-md-4">
<div class="card p-3 text-center">
<h6>Total Students</h6>
<h3 id="totalStudents">0</h3>
</div>
</div>
<div class="col-md-4">
<div class="card p-3 text-center">
<h6>Total Paid</h6>
<h3 id="totalPaid">0</h3>
</div>
</div>
<div class="col-md-4">
<div class="card p-3 text-center">
<h6>Total Unpaid</h6>
<h3 id="totalUnpaid">0</h3>
</div>
</div>
</div>

<!-- ADD STUDENT -->
<div class="card p-4 mb-4">
<h5>Add Student</h5>
<div class="row g-2">
<div class="col-md-3">
<input type="text" id="name" class="form-control" placeholder="Student Name">
</div>
<div class="col-md-2">
<input type="number" id="class" class="form-control" placeholder="Class (1-12)">
</div>
<div class="col-md-2">
<input type="number" id="fee" class="form-control" placeholder="Fee">
</div>
<div class="col-md-2">
<input type="date" id="joinDate" class="form-control">
</div>
<div class="col-md-2">
<select id="status" class="form-control">
<option value="Paid">Paid</option>
<option value="Unpaid">Unpaid</option>
</select>
</div>
<div class="col-md-1">
<button class="btn btn-success w-100" onclick="addStudent()">Add</button>
</div>
</div>
</div>

<!-- SEARCH -->
<input type="text" id="search" class="form-control mb-3" placeholder="Search Student..." onkeyup="render()">

<!-- TABLE -->
<div class="card p-3">
<table class="table table-hover">
<thead class="table-primary">
<tr>
<th>Name</th>
<th>Class</th>
<th>Fee</th>
<th>Join Date</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="studentTable"></tbody>
</table>
</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

let students = JSON.parse(localStorage.getItem("students")) || [];
let editIndex = -1;

function login(){
let pass = document.getElementById("password").value;
if(pass==="1234"){
document.getElementById("loginModal").style.display="none";
document.getElementById("dashboard").style.display="block";
render();
}else{
alert("Wrong Password");
}
}

function saveData(){
localStorage.setItem("students", JSON.stringify(students));
}

function addStudent(){
let name = document.getElementById("name").value;
let cls = document.getElementById("class").value;
let fee = document.getElementById("fee").value;
let joinDate = document.getElementById("joinDate").value;
let status = document.getElementById("status").value;

if(!name || !cls || !fee || !joinDate){
alert("Please fill all fields");
return;
}

let student = {name, class:cls, fee, joinDate, status};

if(editIndex === -1){
students.push(student);
}else{
students[editIndex] = student;
editIndex = -1;
}

saveData();
clearForm();
render();
}

function render(){
let table = document.getElementById("studentTable");
let search = document.getElementById("search").value.toLowerCase();
table.innerHTML="";

students.forEach((s,index)=>{
if(s.name.toLowerCase().includes(search)){
table.innerHTML += `
<tr>
<td>${s.name}</td>
<td>${s.class}</td>
<td>${s.fee}</td>
<td>${s.joinDate}</td>
<td>${s.status}</td>
<td>
<button class="btn btn-sm btn-warning" onclick="editStudent(${index})">Edit</button>
<button class="btn btn-sm btn-danger" onclick="deleteStudent(${index})">Delete</button>
</td>
</tr>`;
}
});

updateSummary();
}

function updateSummary(){
document.getElementById("totalStudents").innerText = students.length;
document.getElementById("totalPaid").innerText =
students.filter(s=>s.status==="Paid").length;
document.getElementById("totalUnpaid").innerText =
students.filter(s=>s.status==="Unpaid").length;
}

function editStudent(index){
let s = students[index];
document.getElementById("name").value = s.name;
document.getElementById("class").value = s.class;
document.getElementById("fee").value = s.fee;
document.getElementById("joinDate").value = s.joinDate;
document.getElementById("status").value = s.status;
editIndex = index;
}

function deleteStudent(index){
if(confirm("Delete Student?")){
students.splice(index,1);
saveData();
render();
}
}

function clearForm(){
document.getElementById("name").value="";
document.getElementById("class").value="";
document.getElementById("fee").value="";
document.getElementById("joinDate").value="";
}

function toggleDark(){
document.body.classList.toggle("dark-mode");
}

</script>

</body>
</html>
